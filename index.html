<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Preconnect to nothing external — fonts served from npm, no CDN needed -->

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="/images/logo.webp" />

  <!-- SEO -->
  <title>Akash Yadav - Frontend Developer</title>
  <meta name="description"
    content="Creative front-end developer crafting responsive, clean websites with performance, precision, and purpose. Available for freelance work." />
  <meta name="author" content="Akash Yadav" />
  <meta name="theme-color" content="#f7fcff" />

  <!-- Open Graph -->
  <meta property="og:title" content="Akash Yadav - Frontend Developer" />
  <meta property="og:description"
    content="Creative front-end developer crafting responsive, clean websites with performance, precision, and purpose." />
  <meta property="og:image" content="/images/Akash.webp" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Akash Yadav - Frontend Developer" />
  <meta name="twitter:description" content="Creative front-end developer crafting responsive, clean websites." />
  <meta name="twitter:image" content="/images/Akash.webp" />

  <!-- Preload hero images — critical above-fold assets -->
  <link rel="preload" href="/images/men.webp" as="image" type="image/webp" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
